<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cookiestv Sports</title>
  <style>
    :root {
      --bg: #09090f;
      --panel: #141420;
      --panel-2: #1a1a2a;
      --panel-3: #202237;
      --text: #ececf4;
      --muted: #a3a3bf;
      --accent: #22c55e;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1000px 500px at -5% -20%, rgba(34,197,94,0.18), transparent 55%),
        radial-gradient(800px 450px at 110% 120%, rgba(34,197,94,0.12), transparent 60%),
        var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(1980px, 100%);
      height: min(1120px, calc(100vh - 4px));
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid var(--border);
      border-radius: 18px;
      display: grid;
      grid-template-columns: 260px 1fr;
      overflow: hidden;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      margin: 0 0 4px 0;
      font-size: 1.08rem;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .nav-link {
      display: inline-block;
      margin-top: 10px;
      color: #8ed0ff;
      text-decoration: none;
      font-size: 0.84rem;
    }

    .channel-list {
      padding: 10px;
      overflow: auto;
      min-height: 0;
    }

    .channel-btn {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      padding: 12px 11px;
      margin-bottom: 8px;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.16s ease;
    }

    .channel-btn:hover { border-color: rgba(34,197,94,0.45); }
    .channel-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(34,197,94,0.25) inset;
    }

    .viewer {
      display: grid;
      place-items: center;
      background: #050509;
      padding: 4px;
      overflow: hidden;
    }

    .frame-wrap {
      width: min(100%, 1820px);
      height: min(100%, 1090px);
      max-width: 100%;
      max-height: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: #000;
    }

    .browser-shell {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      background: #090910;
    }

    .browser-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #141526 0%, #11121f 100%);
    }

    .topbar-title {
      margin: 0;
      font-size: 0.9rem;
      color: #e8ecff;
    }

    .topbar-tag {
      font-size: 0.74rem;
      color: #9ed6b3;
      border: 1px solid rgba(34,197,94,0.45);
      border-radius: 999px;
      padding: 4px 9px;
      background: rgba(34,197,94,0.14);
    }

    .address-pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      color: #becee8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255,255,255,0.03);
    }

    .player-stage {
      position: relative;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 6px;
      padding: 8px;
      background:
        radial-gradient(500px 200px at 20% 0%, rgba(34,197,94,0.14), transparent 55%),
        #07070c;
    }

    .player-meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 10px;
      align-items: center;
      min-height: 0;
    }

    .engine-badge {
      width: fit-content;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid rgba(34,197,94,0.5);
      border-radius: 999px;
      padding: 5px 9px;
      color: #86efac;
      background: rgba(34,197,94,0.16);
    }

    .channel-title {
      font-size: clamp(1.05rem, 1.3vw, 1.3rem);
      margin: 0;
    }

    .channel-url {
      color: var(--muted);
      font-size: 0.78rem;
      line-break: anywhere;
      margin: 0;
      text-decoration: none;
      grid-column: 1 / -1;
    }

    .channel-url:hover {
      color: #bfdbfe;
      text-decoration: underline;
    }

    .sports-note {
      margin: 0;
      font-size: 0.76rem;
      color: #fecaca;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      grid-column: 1 / -1;
      width: fit-content;
      flex-wrap: wrap;
    }

    .sports-note::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #ef4444;
      box-shadow: 0 0 0 4px rgba(239,68,68,0.2);
      flex: 0 0 auto;
    }

    .adguard-link {
      color: #86efac;
      text-decoration: none;
      font-weight: 700;
      text-shadow:
        0 0 4px rgba(134,239,172,0.8),
        0 0 10px rgba(34,197,94,0.75),
        0 0 18px rgba(34,197,94,0.6);
      animation: adguard-glow 1.8s ease-in-out infinite alternate;
    }

    .adguard-link:hover {
      color: #bbf7d0;
      text-decoration: underline;
    }

    @keyframes adguard-glow {
      from {
        text-shadow:
          0 0 3px rgba(134,239,172,0.7),
          0 0 8px rgba(34,197,94,0.65),
          0 0 12px rgba(34,197,94,0.45);
      }
      to {
        text-shadow:
          0 0 6px rgba(134,239,172,0.95),
          0 0 14px rgba(34,197,94,0.9),
          0 0 24px rgba(34,197,94,0.75);
      }
    }

    .status-text {
      margin: 0;
      color: #d9d9e6;
      font-size: 0.82rem;
      justify-self: end;
      text-align: right;
    }

    .status-text.error {
      color: #fca5a5;
    }

    .watch-surface {
      min-height: 0;
      width: min(100%, 1060px);
      height: 465px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #020204;
      position: relative;
    }

    .watch-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .watch-hint {
      position: absolute;
      inset: 0;
      margin: 0;
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      color: var(--muted);
      background: rgba(4,4,8,0.94);
      text-align: center;
      padding: 12px;
      pointer-events: none;
    }

    .watch-hint.hidden {
      display: none;
    }

    .action-btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      color: #f8fafc;
      background: rgba(23,23,39,0.9);
      text-decoration: none;
      font-size: 0.84rem;
      transition: 0.16s ease;
      cursor: pointer;
      backdrop-filter: blur(2px);
    }

    .action-btn:hover:not(:disabled) {
      border-color: rgba(34,197,94,0.5);
      background: #1b1b2e;
    }

    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        height: auto;
        grid-template-columns: 1fr;
      }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .frame-wrap {
        width: min(100%, 1820px);
        height: auto;
        aspect-ratio: 1820 / 1090;
      }
      .watch-surface {
        width: 100%;
        height: auto;
        aspect-ratio: 1060 / 465;
      }
      .player-meta {
        grid-template-columns: 1fr;
        gap: 5px;
      }
      .status-text {
        justify-self: start;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar">
      <div class="header">
        <h1>Sports Channels</h1>
        <p>Updated embedded channels and event players.</p>
        <a class="nav-link" href="/">Back to Live TV</a>
      </div>
      <div class="channel-list" id="channelList"></div>
    </aside>

    <section class="viewer">
      <div class="frame-wrap">
        <div class="browser-shell">
          <div class="browser-topbar">
            <h2 class="topbar-title" id="channelTitle">Select a channel</h2>
            <span class="topbar-tag">Direct embed</span>
          </div>
          <div class="player-stage">
            <div class="address-pill" id="addressPill">about:blank</div>
            <div class="watch-surface">
              <iframe class="watch-frame" id="streamFrame" title="Sports stream player" allow="autoplay; fullscreen; picture-in-picture; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
              <p class="watch-hint" id="watchHint">Choose a channel to start watching.</p>
            </div>
            <div class="player-meta">
              <div class="engine-badge">Embedded iframe mode</div>
              <h2 class="channel-title" id="metaTitle">Loading channel...</h2>
              <a class="channel-url" id="channelUrl" href="#"></a>
              <p class="status-text" id="statusText"></p>
              <p class="sports-note">
                Seeing popups, try installing
                <a class="adguard-link" href="https://adguard.com/de/adguard-browser-extension/overview.html" target="_blank" rel="noreferrer noopener">AdGuard</a>.
              </p>
              <button class="action-btn" id="reloadPlayer" type="button">Reload Channel</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const channels = [
      { name: "DAZN 1 Germany", url: "https://viewembed.ru/channel/DAZN1Deutschland%5BGermany%5D" },
      { name: "DAZN 2 Germany", url: "https://viewembed.ru/channel/DAZN2Deutschland%5BGermany%5D" },
      { name: "Player 1", url: "https://viewembed.ru/event/bournemouth_man-utd_1774036800" },
      { name: "Player 2", url: "https://viewembed.ru/event/fc-barcelona_newcastle_1773855900" },
      { name: "Player 3", url: "https://viewembed.ru/event/midtjylland_nottingham_1773942300" },
      { name: "TNT Sports 1", url: "https://viewembed.ru/channel/TNTSports1%5BUK%5D" },
      { name: "TNT Sports 2", url: "https://viewembed.ru/channel/TNTSports2%5BUK%5D" },
      { name: "TNT Sports 3", url: "https://viewembed.ru/channel/TNTSports3%5BUK%5D" },
      { name: "TNT Sports 4", url: "https://viewembed.ru/channel/TNTSports4%5BUK%5D" },
      { name: "DigiSport 1", url: "https://viewembed.ru/channel/DigiSport1%5BRomania%5D" },
      { name: "DigiSport 2", url: "https://viewembed.ru/channel/DigiSport2%5BRomania%5D" },
      { name: "DigiSport 3", url: "https://viewembed.ru/channel/DigiSport3%5BRomania%5D" },
      { name: "ArenaSport 1 (Serbia)", url: "https://viewembed.ru/channel/ArenaSport1%5BSerbia%5D" },
      { name: "ArenaSport 2", url: "https://viewembed.ru/channel/ArenaSport2%5BSerbia%5D" },
      { name: "Arena Sport 3", url: "https://viewembed.ru/channel/ArenaSport3%5BSerbia%5D" },
      { name: "Arena Sport 4", url: "https://viewembed.ru/channel/ArenaSport4%5BSerbia%5D" },
      { name: "Arena Sport 5", url: "https://viewembed.ru/channel/ArenaSport5%5BSerbia%5D" },
      { name: "Arena Sport 6", url: "https://viewembed.ru/channel/ArenaSport6%5BSerbia%5D" },
      { name: "SuperSportFootball", url: "https://viewembed.ru/channel/SuperSportFootball%5BSouthAfrica%5D" },
      { name: "Bein Sports 1", url: "https://viewembed.ru/channel/BeINSport1%5BFrance%5D" },
      { name: "Bein Sports 2", url: "https://viewembed.ru/channel/BeINSport2%5BFrance%5D" },
      { name: "Bein Sports 3", url: "https://viewembed.ru/channel/BeINSport3%5BFrance%5D" }
    ];

    const list = document.getElementById("channelList");
    const reloadPlayer = document.getElementById("reloadPlayer");
    const channelHeading = document.getElementById("channelTitle");
    const metaTitle = document.getElementById("metaTitle");
    const channelUrl = document.getElementById("channelUrl");
    const statusText = document.getElementById("statusText");
    const addressPill = document.getElementById("addressPill");
    const streamFrame = document.getElementById("streamFrame");
    const watchHint = document.getElementById("watchHint");

    let selectedChannel = null;

    function withAutoplay(rawUrl) {
      const parsed = new URL(rawUrl);
      parsed.searchParams.set("autoplay", "1");
      return parsed.toString();
    }

    function updateStatus(text, isError = false) {
      statusText.textContent = text;
      statusText.classList.toggle("error", isError);
    }

    function loadSelectedChannel() {
      if (!selectedChannel) {
        updateStatus("Select a channel first.", true);
        return;
      }
      const autoplayUrl = withAutoplay(selectedChannel.url);
      watchHint.classList.add("hidden");
      streamFrame.src = autoplayUrl;
      updateStatus(`Playing ${selectedChannel.name} in direct mode.`);
    }

    function selectChannel(index) {
      const selected = channels[index];
      selectedChannel = selected;

      document.querySelectorAll(".channel-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
      });
      channelHeading.textContent = selected.name;
      metaTitle.textContent = selected.name;
      channelUrl.textContent = selected.url;
      channelUrl.href = selected.url;
      channelUrl.target = "_blank";
      channelUrl.rel = "noreferrer noopener";
      addressPill.textContent = selected.url;
      loadSelectedChannel();
    }

    channels.forEach((channel, index) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "channel-btn";
      btn.textContent = channel.name;
      btn.addEventListener("click", () => selectChannel(index));
      list.appendChild(btn);
    });

    streamFrame.addEventListener("load", () => {
      if (!selectedChannel) return;
      updateStatus(`Player loaded ${selectedChannel.name}.`);
    });

    reloadPlayer.addEventListener("click", loadSelectedChannel);

    selectChannel(0);
  </script>
</body>
</html>
